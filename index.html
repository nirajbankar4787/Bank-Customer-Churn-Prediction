<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bank Customer Churn Prediction</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background: #f5f7fa; }
        h1 { color: #2c3e50; }
        form { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { background: #3498db; color: white; padding: 12px 20px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        button:hover { background: #2980b9; }
        .result { margin-top: 20px; padding: 15px; border-radius: 8px; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🏦 Bank Customer Churn Prediction</h1>
    
    <form action="{{ url_for('predict') }}" method="POST">
        <label>Credit Score:</label>
        <input type="number" name="credit_score" required value="650">

        <label>Country:</label>
        <select name="country" required>
            <option value="France">France</option>
            <option value="Spain">Spain</option>
            <option value="Germany">Germany</option>
        </select>

        <label>Gender:</label>
        <select name="gender" required>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select>

        <label>Age:</label>
        <input type="number" name="age" required value="40">

        <label>Tenure (years):</label>
        <input type="number" name="tenure" required value="3">

        <label>Balance:</label>
        <input type="number" step="0.01" name="balance" required value="50000">

        <label>Number of Products:</label>
        <input type="number" name="products_number" required value="2">

        <label>Credit Card (1=Yes, 0=No):</label>
        <input type="number" name="credit_card" min="0" max="1" required value="1">

        <label>Active Member (1=Yes, 0=No):</label>
        <input type="number" name="active_member" min="0" max="1" required value="1">

        <label>Estimated Salary:</label>
        <input type="number" step="0.01" name="estimated_salary" required value="60000">

        <button type="submit">Predict Churn</button>
    </form>

    {% if prediction_text is defined and prediction_text %}
    <div class="result">
        <strong>{{ prediction_text }}</strong><br>
        <strong>{{ probability_text|default('') }}</strong><br>
        <strong>{{ risk_text|default('N/A') }}</strong>
    </div>
    {% endif %}

</body>
</html>
